services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tracker}
      POSTGRES_USER: ${POSTGRES_USER:-tracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tracker}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-tracker}:${POSTGRES_PASSWORD:-tracker}@postgres:5432/${POSTGRES_DB:-tracker}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-replace-me-access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-replace-me-refresh}
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 7d
      CORS_ORIGIN: http://localhost:${NGINX_PORT:-8080},http://127.0.0.1:${NGINX_PORT:-8080},http://localhost:${WEB_PORT:-3000},http://127.0.0.1:${WEB_PORT:-3000}
      DEMO_USER_EMAIL: ${DEMO_USER_EMAIL:-owner@tracker.local}
      DEMO_USER_PASSWORD: ${DEMO_USER_PASSWORD:-changeme123}
    ports:
      - "${API_PORT:-3001}:3001"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${NGINX_PORT:-8080}/api
      NEXT_PUBLIC_SOCKET_URL: http://localhost:${NGINX_PORT:-8080}
    ports:
      - "${WEB_PORT:-3000}:3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  redis_data:

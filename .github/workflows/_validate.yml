name: Monorepo Validate

on:
  workflow_call:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  validate:
    name: Validate Monorepo
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
      DATABASE_URL: postgresql://tracker:tracker@localhost:5432/tracker?schema=public

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        run: pnpm --filter @tracker/db exec prisma validate --schema prisma/schema.prisma

      - name: Generate Prisma client
        run: pnpm --filter @tracker/db prisma:generate

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm --filter @tracker/api test

      - name: Build
        run: pnpm -r build

      - name: Validate Docker Compose configuration
        run: docker compose config --quiet
